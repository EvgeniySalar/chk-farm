<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐔 Chicken Brainrot</title>
<style>
/* ============================================================ BASE */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d0f;--card:#13131a;--border:#1e2040;
  --text:#d8d8e8;--egg:#f5c518;--green:#39ff14;
  --red:#ff3355;--blue:#4488ff;--purple:#9944ff;
}


html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Courier New',monospace;color:var(--text);}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
    rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
}

/* ============================================================ INTRO */
#intro{
  position:fixed;inset:0;background:#000;z-index:8000;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;overflow:hidden;
}
#intro.fade-out{animation:introFade 1.2s forwards;}
@keyframes introFade{to{opacity:0;pointer-events:none;}}

#intro-noise{
  position:absolute;inset:0;opacity:0.04;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}
#intro-silhouette{
  position:absolute;bottom:0;right:80px;width:220px;height:280px;
  opacity:0;filter:brightness(0) blur(2px);
  transition:opacity 3s ease,filter 3s ease;
}
#intro-silhouette.visible{opacity:0.15;filter:brightness(0) blur(1px);}
#intro-silhouette.glowing{
  opacity:0.4;
  filter:brightness(0) saturate(100%) invert(30%) sepia(100%)
         saturate(1000%) hue-rotate(90deg) blur(0px)
         drop-shadow(0 0 20px #39ff14);
  animation:silPulse 2s ease-in-out infinite;
}
@keyframes silPulse{
  0%,100%{filter:brightness(0) saturate(100%) invert(30%) sepia(100%)
           saturate(1000%) hue-rotate(90deg) drop-shadow(0 0 15px #39ff14);}
  50%    {filter:brightness(0) saturate(100%) invert(30%) sepia(100%)
           saturate(1000%) hue-rotate(90deg) drop-shadow(0 0 40px #39ff14) blur(1px);}
}
#intro-content{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:800px;   /* ← было 600px */
  padding:20px;
  width:100%;
}

#intro-tag{
  font-size:0.7rem;color:#333;letter-spacing:4px;
  text-transform:uppercase;margin-bottom:30px;transition:color 1s;
}
#intro-tag.lit{color:#555;}
#intro-main-title{
  font-size:clamp(2rem,6vw,3.5rem);font-weight:900;color:#eaeaea;
  letter-spacing:2px;line-height:1.1;text-shadow:0 0 40px rgba(255,255,255,0.05);
}
#intro-main-title .word-farm{color:#6eb56e;}
#intro-main-title.glitch{animation:titleGlitch 0.1s infinite;}
@keyframes titleGlitch{
  0%  {text-shadow:2px 0 #ff0044,-2px 0 #00ffcc;transform:translate(0);}
  25% {text-shadow:-2px 0 #ff0044,2px 0 #00ffcc;transform:translate(-2px,1px);}
  50% {text-shadow:2px 2px #ff0044,-2px -2px #00ffcc;transform:translate(1px,-1px);}
  75% {text-shadow:-3px 0 #ff0044,3px 0 #00ffcc;transform:translate(2px,0);}
  100%{text-shadow:2px 0 #ff0044,-2px 0 #00ffcc;transform:translate(0);}
}
#intro-terminal{
  min-height:100px;  /* ← уменьшили чуть */
  margin:15px 0;
  text-align:left;
  background:#050508;
  border:1px solid #1a1a30;
  border-radius:8px;
  padding:12px 18px;
  font-size:0.82rem;
  line-height:1.9;
  color:#666;
}
#intro-terminal .t-line{display:block;}
#intro-terminal .t-line.green {color:#2d8a2d;}
#intro-terminal .t-line.yellow{color:#8a7a2d;}
#intro-terminal .t-line.red   {color:#8a2d2d;}
#intro-terminal .t-line.bright{color:#aaaaaa;}
#intro-terminal .cursor{
  display:inline-block;width:8px;height:14px;background:#666;
  animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#intro-btn{
  display:none;margin-top:20px;padding:14px 50px;background:transparent;
  color:#6eb56e;border:1px solid #2d5a2d;border-radius:8px;
  font-family:'Courier New',monospace;font-size:0.9rem;letter-spacing:3px;
  cursor:pointer;transition:all 0.3s;text-transform:uppercase;
}
#intro-btn:hover{
  background:#0a1f0a;border-color:#39ff14;color:#39ff14;
  box-shadow:0 0 20px rgba(57,255,20,0.2);letter-spacing:5px;
}
#intro-btn.show{display:inline-block;animation:btnAppear 0.8s ease;}
@keyframes btnAppear{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ============================================================ GAME */
#game{display:none;width:100vw;height:100vh;flex-direction:column;overflow:hidden;}
#game.active{display:flex;}

/* HUD */
#hud{
  flex:0 0 auto;display:flex;align-items:center;gap:12px;
  padding:7px 14px;background:rgba(0,0,0,0.7);
  border-bottom:1px solid #1e2040;backdrop-filter:blur(4px);
  flex-wrap:wrap;z-index:100;
}
.hud-stat{
  display:flex;align-items:center;gap:5px;font-size:0.82rem;
  background:#0a0a14;border:1px solid #1e2040;border-radius:6px;padding:4px 9px;
}
.hud-val{font-weight:bold;color:var(--egg);min-width:28px;text-align:right;}
#chaos-wrap{flex:1;min-width:130px;}
#chaos-hdr{display:flex;justify-content:space-between;font-size:0.7rem;margin-bottom:3px;color:#666;}
#chaos-track{height:11px;background:#0a0a14;border:1px solid #1e2040;border-radius:5px;overflow:hidden;}
#chaos-fill{
  height:100%;width:0%;border-radius:5px;
  background:linear-gradient(90deg,#1a8a1a,#8a8a00,#8a0000);transition:width 0.2s;
}
#chaos-fill.pulse{animation:chaosPulse 0.4s ease-in-out infinite;}
@keyframes chaosPulse{0%,100%{box-shadow:0 0 5px rgba(255,50,50,0.4);}50%{box-shadow:0 0 14px rgba(255,50,50,0.9);}}
#phase-badge{font-size:0.68rem;padding:4px 9px;border-radius:20px;background:#0a0a14;border:1px solid #1e2040;color:#555;white-space:nowrap;}

/* MAIN AREA */
#main-area{flex:1;display:flex;overflow:hidden;position:relative;}

/* FARM */
#farm-wrap{flex:1;position:relative;overflow:hidden;}
#farm-canvas{position:absolute;inset:0;width:100%;height:100%;}

.meme-float{
  position:fixed;pointer-events:none;font-size:1rem;font-weight:bold;
  color:var(--green);text-shadow:0 0 8px rgba(57,255,20,0.6);
  animation:memeRise 1.8s ease-out forwards;white-space:nowrap;z-index:300;
}
.egg-float{
  position:fixed;pointer-events:none;font-size:0.85rem;font-weight:bold;
  color:var(--egg);animation:memeRise 1s ease-out forwards;z-index:300;
}
@keyframes memeRise{
  0%  {opacity:1;transform:translateY(0) scale(1);}
  60% {opacity:1;transform:translateY(-40px) scale(1.1);}
  100%{opacity:0;transform:translateY(-80px) scale(0.8);}
}

/* SIDE PANEL */
#side-panel{
  width:210px;flex:0 0 210px;display:flex;flex-direction:column;
  gap:7px;padding:8px 7px;background:rgba(0,0,0,0.6);
  border-left:1px solid #1e2040;overflow-y:auto;z-index:10;
}
.panel-section{background:#0a0a14;border:1px solid #1e2040;border-radius:8px;padding:9px;}
.panel-section h3{
  font-size:0.66rem;color:#444;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #1e2040;
}
.act-btn{
  width:100%;background:#0d0d1a;border:1px solid #1e2040;border-radius:6px;
  padding:8px 7px;cursor:pointer;font-family:'Courier New',monospace;
  color:var(--text);font-size:0.74rem;text-align:left;display:flex;
  align-items:center;gap:7px;transition:all 0.18s;margin-bottom:4px;
  position:relative;overflow:hidden;
}
.act-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:currentColor;opacity:0.4;}
.act-btn:hover:not(:disabled){background:#141428;transform:translateX(2px);border-color:currentColor;}
.act-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}
.act-btn .bi{font-size:1.1rem;flex:0 0 auto;}
.act-btn .bi2{display:flex;flex-direction:column;}
.act-btn .bn{font-weight:bold;font-size:0.74rem;}
.act-btn .bc{font-size:0.63rem;color:var(--egg);}
#btn-feed{color:#6eb56e;}#btn-buy{color:#4488ff;}
#btn-update{color:#ff3355;}#btn-av{color:#9944ff;}

/* sound slots */
.snd-slot{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.snd-slot label{font-size:0.63rem;color:#555;flex:0 0 60px;}
.snd-slot input[type=file]{flex:1;font-size:0.55rem;color:#888;background:transparent;border:none;cursor:pointer;min-width:0;}
.snd-slot input[type=file]::-webkit-file-upload-button{
  background:#0d0d1a;color:#666;border:1px solid #1e2040;border-radius:3px;
  padding:2px 5px;font-size:0.55rem;cursor:pointer;font-family:'Courier New',monospace;
}
.tsb{background:none;border:1px solid #1e2040;border-radius:3px;color:#555;font-size:0.6rem;padding:2px 5px;cursor:pointer;font-family:'Courier New',monospace;transition:all 0.2s;flex:0 0 auto;}
.tsb:hover{color:#39ff14;border-color:#39ff14;}
#vol-wrap{display:flex;align-items:center;gap:5px;margin-top:5px;}
#vol-wrap label{font-size:0.63rem;color:#555;}
#vol-slider{flex:1;accent-color:#39ff14;}
#vol-val{font-size:0.63rem;color:#888;min-width:25px;}

/* chicken list */
.ch-row{display:flex;align-items:center;gap:5px;padding:4px 3px;border-radius:4px;transition:background 0.2s;cursor:pointer;font-size:0.68rem;}
.ch-row:hover{background:#0d0d20;}
.ch-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}
.ch-dot.normal{background:#4488ff;}.ch-dot.zombie{background:#39ff14;box-shadow:0 0 5px #39ff14;}.ch-dot.weak{background:#666;}
.ch-name{flex:1;color:#888;}.ch-st{font-size:0.58rem;color:#444;}

/* LOG */
#log{
  flex:0 0 auto;height:48px;background:rgba(0,0,0,0.75);
  border-top:1px solid #1e2040;padding:3px 10px;
  overflow-y:auto;font-size:0.67rem;color:#444;z-index:100;
}
#log .le{display:block;padding:1px 0;}
#log .le.g{color:#2d6a2d;}#log .le.r{color:#6a2d2d;}
#log .le.y{color:#6a5a2d;}#log .le.b{color:#2d3d6a;}

/* GAME OVER */
#gameover{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);
  z-index:7000;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:20px;
}
#gameover.active{display:flex;}
#go-title{font-size:clamp(1.8rem,5vw,3.2rem);font-weight:900;color:#ff3355;animation:titleGlitch 0.15s infinite;margin-bottom:10px;}
#go-sub{color:#39ff14;font-size:0.95rem;letter-spacing:3px;margin-bottom:7px;}
#go-msg{color:#555;font-size:0.82rem;max-width:400px;line-height:1.7;margin-bottom:18px;}
#go-stats{color:#333;font-size:0.77rem;line-height:2;margin-bottom:22px;white-space:pre-line;}
#go-restart{
  padding:12px 38px;background:#ff3355;color:#fff;border:none;border-radius:7px;
  font-family:'Courier New',monospace;font-size:0.88rem;font-weight:bold;
  cursor:pointer;letter-spacing:2px;transition:all 0.2s;
}
#go-restart:hover{background:#ff5577;box-shadow:0 0 18px rgba(255,51,85,0.5);transform:scale(1.04);}

/* GLITCH FLASH */
#glitch-flash{position:fixed;inset:0;pointer-events:none;z-index:6000;display:none;}
#glitch-flash.on{display:block;animation:glFlash 0.22s forwards;}
@keyframes glFlash{0%{background:rgba(57,255,20,0.07);}50%{background:rgba(255,51,85,0.09);}100%{background:transparent;}}

/* SHAKE CLASSES */
#game.shake-low {animation:shakeA 1.8s infinite;}
#game.shake-mid {animation:shakeB 0.5s infinite;}
#game.shake-high{animation:shakeC 0.18s infinite;}
@keyframes shakeA{0%,100%{transform:translate(0,0)}33%{transform:translate(-1px,1px)}66%{transform:translate(1px,-1px)}}
@keyframes shakeB{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,2px) rotate(-0.3deg)}75%{transform:translate(2px,-2px) rotate(0.3deg)}}
@keyframes shakeC{
  0%,100%{transform:translate(0,0)}10%{transform:translate(-3px,2px)}
  20%{transform:translate(3px,-2px)}30%{transform:translate(-4px,1px)}
  40%{transform:translate(4px,-1px)}50%{transform:translate(-2px,3px)}
  60%{transform:translate(2px,-3px)}70%{transform:translate(-3px,-2px)}
  80%{transform:translate(3px,2px)}90%{transform:translate(-1px,1px)}
}

/* DEBUG PANEL */
#debug-panel{
  display:none;position:fixed;bottom:60px;left:10px;z-index:5000;
  background:rgba(0,0,0,0.92);border:1px solid #39ff14;border-radius:8px;
  padding:12px;font-size:0.72rem;color:#39ff14;min-width:220px;
}
#debug-panel.open{display:block;}
#debug-panel h4{color:#39ff14;letter-spacing:2px;margin-bottom:8px;font-size:0.7rem;}
.dbg-row{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
.dbg-btn{
  padding:4px 10px;background:#0a1a0a;border:1px solid #39ff14;
  border-radius:4px;color:#39ff14;font-family:'Courier New',monospace;
  font-size:0.68rem;cursor:pointer;transition:all 0.15s;flex:1;
}
.dbg-btn:hover{background:#1a3a1a;}
.dbg-label{color:#555;flex:0 0 70px;font-size:0.65rem;}
#debug-toggle{
  position:fixed;bottom:10px;left:10px;z-index:5001;
  padding:10px 20px;
  background:transparent;
  border:none;
  color:transparent;
  cursor:default;
  display:none;
}
#debug-toggle.show{display:block;}
/* невидимая — но работает по нажатию D */
#debug-toggle:hover{
  background:transparent;
  color:transparent;
}

#debug-toggle.show{display:block;}
#debug-toggle:hover{border-color:#39ff14;color:#39ff14;}
#big-meme.show{display:flex;}
@keyframes bigMemeAnim{
  0%  {opacity:0;transform:scale(0.5);}
  15% {opacity:1;transform:scale(1.2);}
  70% {opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(0.8);}
}
#intro-tars.visible{
  opacity:1 !important;
  letter-spacing:30px !important;
  animation:tarsPulse 3s ease-in-out infinite;
}
@keyframes tarsPulse{
  0%,100%{text-shadow:0 0 20px rgba(57,255,20,0.3);}
  50%    {text-shadow:0 0 60px rgba(57,255,20,0.8), 0 0 100px rgba(57,255,20,0.4);}
}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#050508;}
::-webkit-scrollbar-thumb{background:#1e2040;border-radius:2px;}
@media(max-width:600px){#side-panel{width:150px;flex:0 0 150px;}}
@media (max-width: 600px) {

  #intro {
    padding: 20px;
    text-align: center;
    justify-content: flex-start;  /* ← контент к верху */
    padding-top: 30px;            /* ← отступ сверху */
    overflow-y: auto;             /* ← скролл если нужен */
  }

  #intro h1 {
    font-size: 1.4em;
  }

  canvas {
    max-width: 100vw;
    max-height: 100vh;
  }

  /* Картинки меньше и не мешают */
  #intro-img-left {
    width: 80px !important;
    left: 5px !important;
    opacity: 0.3 !important;
  }

  #intro-img-right {
    width: 80px !important;
    right: 5px !important;
    opacity: 0.3 !important;
  }

  /* Заголовок меньше */
  #intro-main-title {
    font-size: 2em !important;
  }

  #intro-tars {
    font-size: 3rem !important;
    letter-spacing: 8px !important;
  }

  /* Терминал меньше */
  #intro-terminal {
    font-size: 0.7em !important;
    max-height: 60px !important;
    overflow: hidden !important;
  }

  /* Контент поверх картинок */
  #intro-content {
    position: relative;
    z-index: 10;
    width: 100%;
  }

  /* Кнопка старта */
  #intro-btn {
    position: relative;
    z-index: 99 !important;
    margin-top: 10px !important;  /* ← меньше отступ */
    padding: 12px 30px !important;
    font-size: 1em !important;
    display: block !important;
  }
}




</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-noise"></div>
  <canvas id="intro-silhouette" width="220" height="280"></canvas>
<!-- Левая картинка -->
<img id="intro-img-left" src="Image.png" style="
  position:absolute;
  bottom:0;
  left:40px;
  width:180px;
  height:auto;
  opacity:0;
  transition:opacity 2s ease;
  filter:drop-shadow(0 0 15px rgba(57,255,20,0.4));
  z-index:1;
  pointer-events:none;
">

<!-- Правая картинка -->
<img id="intro-img-right" src="Image_.png" style="
  position:absolute;
  bottom:0;
  right:40px;
  width:180px;
  height:auto;
  opacity:0;
  transition:opacity 2s ease;
  filter:drop-shadow(0 0 15px rgba(255,51,85,0.4));
  z-index:1;
  pointer-events:none;
">

<div id="intro-content">
  <div id="intro-tag">CLASSIFIED SIMULATION v1.9.9</div>
  
  <div id="intro-title-wrap">
    <div id="intro-main-title">TARS <span class="word-farm">FARM</span></div>
  </div>

  <div id="intro-tars" style="
    font-size:clamp(4rem,15vw,10rem);
    font-weight:900;
    color:transparent;
    -webkit-text-stroke:3px #39ff14;
    letter-spacing:15px;
    text-align:center;
    text-shadow:0 0 40px rgba(57,255,20,0.3);
    margin-top:5px;
    opacity:0;
    transition:opacity 2s ease, letter-spacing 2s ease;
    font-family:'Courier New',monospace;
  ">TARS</div>

  <div id="intro-terminal">
    <span class="cursor" id="intro-cursor"></span>
  </div>
  <button id="intro-btn" onclick="startGame()">[ ENTER FARM ]</button>
 </div>
</div> 

<!-- GLITCH -->
<div id="glitch-flash"></div>

<!-- GAME OVER -->
<div id="gameover">
  <div id="go-title">SYSTEM OVERLOAD</div>
  <div id="go-sub"></div>
  <div id="go-msg"></div>
  <div id="go-stats"></div>
  <button id="go-restart" onclick="restartGame()">↺ TRY AGAIN</button>
</div>

<!-- DEBUG -->
<button id="debug-toggle" onclick="toggleDebug()">[D] DEBUG</button>
<div id="debug-panel">
  <h4>⚙ DEBUG MODE</h4>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="G.eggs+=500">+500 🥚</button>
    <button class="dbg-btn" onclick="G.feed+=20">+20 🌽</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="G.chaos=Math.min(100,G.chaos+20)">+20% ⚡</button>
    <button class="dbg-btn" onclick="G.chaos=Math.max(0,G.chaos-20)">-20% ⚡</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="dbgSpawnZombie()">☣️ Spawn Zombie</button>
    <button class="dbg-btn" onclick="dbgSpawnNormal()">🐔 Spawn Chicken</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="G.chaos=99">💀 Near GameOver</button>
    <button class="dbg-btn" onclick="G.chaos=0">✅ Reset Chaos</button>
  </div>
  <div class="dbg-row">
    <span class="dbg-label">Speed mult</span>
    <button class="dbg-btn" onclick="DBG.speedMult=1">x1</button>
    <button class="dbg-btn" onclick="DBG.speedMult=3">x3</button>
    <button class="dbg-btn" onclick="DBG.speedMult=8">x8</button>
  </div>
  <div class="dbg-row">
    <button class="dbg-btn" onclick="triggerGlitch()">🎭 Glitch FX</button>
    <button class="dbg-btn" onclick="dbgMutateAll()">☢ Mutate ALL</button>
  </div>
  <div style="color:#333;font-size:0.6rem;margin-top:6px;">Press [D] to toggle</div>
</div>
<!-- BIG MEME OVERLAY -->
<div id="big-meme" style="
  display:none;position:fixed;inset:0;pointer-events:none;z-index:4000;
  align-items:center;justify-content:center;
">
  <div id="big-meme-text" style="
    font-size:clamp(2rem,8vw,5rem);font-weight:900;
    color:#39ff14;text-shadow:0 0 30px #39ff14, 0 0 60px #39ff14;
    font-family:'Courier New',monospace;text-align:center;
    animation:bigMemeAnim 2.5s forwards;
  "></div>
</div>
<!-- MAIN GAME -->
<div id="game">
  <div id="hud">
    <div class="hud-stat">🥚 <span class="hud-val" id="h-eggs">0</span></div>
    <div class="hud-stat">🌽 <span class="hud-val" id="h-feed">10</span></div>

<script>
'use strict';
/* ============================================================
   CONFIG — увеличены скорости для более динамичного геймплея
============================================================ */
const CFG = {
  SPEED_NORMAL: 90,
  SPEED_ZOMBIE: 180,
  SPEED_WEAK:   45,
  DIGEST_NORMAL: 1,
  DIGEST_ZOMBIE: 0.8,
  DIGEST_WEAK:   3.0,
  CHAOS_ZOMBIE: 2.2,
  CHAOS_NORMAL: 0.05,
  INFECT_RANGE:  90,
  INFECT_TIME:   2,
  FEED_INTERVAL: 3,
  ZOMBIE_IDLE:   2.5,
  ZOMBIE_AUTOFEED: 1.5,
};


/* ============================================================
   DEBUG STATE
============================================================ */
const DBG = { open: false, speedMult: 1 };

function toggleDebug(){
  DBG.open = !DBG.open;
  document.getElementById('debug-panel').classList.toggle('open', DBG.open);
}
function dbgSpawnZombie(){ const c=mkChicken('zombie'); G.chickens.push(c); log(`🧟 DEBUG: spawned zombie #${c.id+1}`,'r'); }
function dbgSpawnNormal(){ const c=mkChicken('normal'); G.chickens.push(c); log(`🐔 DEBUG: spawned chicken #${c.id+1}`,'b'); }
function dbgMutateAll(){ G.chickens.forEach(c=>{ if(c.type!=='zombie') mutateChicken(c,true); }); }

/* ============================================================
   GAME STATE
============================================================ */
const G = {
  eggs:20, feed:10, chaos:0,
  chickens:[], nextId:0, gameOver:false,
  startTime:0, totalEggs:0, totalMutations:0, antivirusUsed:0,
  buyCost:2, updateCost:12, avCost:18,
  feedAccum:0, volume:0.6,
  customSounds:{},
  _raf:null,
  gameTime:0,            
  _firstZombieDone:false,  
};


/* ============================================================
   CANVAS
============================================================ */
let cv, cx, FW, FH;

function setupCanvas(){
  cv = document.getElementById('farm-canvas');
  cx = cv.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas(){
  const w = document.getElementById('farm-wrap');
  FW = cv.width  = w.clientWidth;
  FH = cv.height = w.clientHeight;
}

/* ============================================================
   FARM LAYOUT
============================================================ */
function getFenceRect(){
  const pad = 50;
  return { x:pad, y:FH*0.22, w:FW-pad*2, h:FH*0.7 };
}

/* ============================================================
   CHICKEN DATA
============================================================ */
function mkChicken(type='normal'){
  const fr = getFenceRect();
  const pad = 30;
  const x = fr.x + pad + Math.random()*(fr.w - pad*2);
  const y = fr.y + pad + Math.random()*(fr.h - pad*2);
  const angle = Math.random()*Math.PI*2;
  return {
    id: G.nextId++, type,
    state:'hungry',
    x, y,
    angle, targetAngle: angle,
    turnTimer: 1+Math.random()*2.5,
    digestTimer:0, maxDigest:1,
    autoFeedTimer:0, memeTimer:Math.random()*4,
    bobPhase: Math.random()*Math.PI*2,
    scale: 0.82 + Math.random()*0.26,
    infectionTimer:0,
    hue: Math.floor(Math.random()*360),
    _hx:0,_hy:0,_hw:0,_hh:0,
    zombieFreq: 150 + Math.floor(Math.random()*300),
    zombiePitch: Math.random()>0.5 ? 'sawtooth' : 'square',
    bubbleText: null,
    bubbleTimer: 0,
    cluckTimer: 3 + Math.random()*5, // ← звук ко-ко
	memeSoundPlayed: false,
    
  };
}



/* ============================================================
   FARMER (BEAR) STATE
============================================================ */
const FARMER = {
  x:0, y:0,
  angle:0, targetAngle:0,
  walkTimer:0,
  actionTimer:0,
  state:'idle',
  targetChicken:null,
  bucketSwing:0,
};

function initFarmer(){
  const fr = getFenceRect();
  FARMER.x = fr.x + fr.w*0.5;
  FARMER.y = fr.y + fr.h*0.4;
  FARMER.angle = 0;
  FARMER.targetAngle = 0;
  FARMER.state = 'idle';
  FARMER.walkTimer = 2;
}

function updateFarmer(dt){
  FARMER.bucketSwing = Math.sin(Date.now()/400) * 0.15;

  FARMER.actionTimer -= dt;
  if(FARMER.actionTimer <= 0){
    FARMER.actionTimer = 0.5;
    let best = null, bestDist = 9999;
    for(const ch of G.chickens){
      if(ch.state !== 'hungry') continue;
      const dx = ch.x - FARMER.x, dy = ch.y - FARMER.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d < bestDist){ bestDist=d; best=ch; }
    }
    FARMER.targetChicken = best;
  }

  if(FARMER.targetChicken && FARMER.targetChicken.state === 'hungry'){
    const tc = FARMER.targetChicken;
    const dx = tc.x - FARMER.x, dy = tc.y - FARMER.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if(dist > 45){
      FARMER.state = 'walking';
      FARMER.targetAngle = Math.atan2(dy, dx);
      let da = FARMER.targetAngle - FARMER.angle;
      while(da > Math.PI) da -= Math.PI*2;
      while(da < -Math.PI) da += Math.PI*2;
      FARMER.angle += da * Math.min(1, 5*dt);
      const spd = 110; // было 90 — фермер быстрее
      FARMER.x += Math.cos(FARMER.angle)*spd*dt;
      FARMER.y += Math.sin(FARMER.angle)*spd*dt;
    } else {
      FARMER.state = 'feeding';
      if(G.feed >= 1){
        G.feed--;
        startDigest(tc);
        playTone(500,'sine',0.06,0.08);
      }
      FARMER.targetChicken = null;
    }
  } else {
    FARMER.state = 'idle';
    FARMER.walkTimer -= dt;
    if(FARMER.walkTimer <= 0){
      FARMER.walkTimer = 2+Math.random()*3;
      FARMER.targetAngle = FARMER.angle + (Math.random()-0.5)*Math.PI;
    }
    let da = FARMER.targetAngle - FARMER.angle;
    while(da > Math.PI) da -= Math.PI*2;
    while(da < -Math.PI) da += Math.PI*2;
    FARMER.angle += da * Math.min(1, 2*dt);
    FARMER.x += Math.cos(FARMER.angle)*20*dt;
    FARMER.y += Math.sin(FARMER.angle)*20*dt;
  }

  const fr = getFenceRect();
  const pad = 35;
  FARMER.x = Math.max(fr.x+pad, Math.min(fr.x+fr.w-pad, FARMER.x));
  FARMER.y = Math.max(fr.y+pad, Math.min(fr.y+fr.h-pad, FARMER.y));
}
 

/* ============================================================
   DRAW FARM BACKGROUND
============================================================ */
function drawBackground(){
  const skyGrd = cx.createLinearGradient(0,0,0,FH*0.35);
  skyGrd.addColorStop(0,'#1a2a3a');
  skyGrd.addColorStop(1,'#2a3a20');
  cx.fillStyle = skyGrd;
  cx.fillRect(0,0,FW,FH);

  const groundGrd = cx.createLinearGradient(0,FH*0.25,0,FH);
  groundGrd.addColorStop(0,'#1e3a14');
  groundGrd.addColorStop(0.5,'#183010');
  groundGrd.addColorStop(1,'#0f200a');
  cx.fillStyle = groundGrd;
  cx.fillRect(0, FH*0.25, FW, FH);

  cx.save();
  for(let i=0;i<60;i++){
    const gx = ((i*137+42)%FW);
    const gy = FH*0.3 + ((i*97)%(FH*0.65));
    const gs = 0.5+((i*31)%10)*0.08;
    drawGrassTuft(gx, gy, gs);
  }
  cx.restore();

  drawFence();
  drawCoop();
}

function drawGrassTuft(x,y,s){
  cx.save();
  cx.translate(x,y);
  cx.scale(s,s);
  const c = `rgba(${30+Math.floor(s*20)},${70+Math.floor(s*30)},${10+Math.floor(s*10)},0.7)`;
  cx.strokeStyle = c;
  cx.lineWidth = 1.5;
  cx.lineCap = 'round';
  for(let i=-1;i<=1;i++){
    cx.beginPath();
    cx.moveTo(i*4, 0);
    cx.lineTo(i*3, -8-Math.abs(i)*2);
    cx.stroke();
  }
  cx.restore();
}

function drawFence(){
  const fr = getFenceRect();
  cx.save();
  const postColor  = '#4a3520';
  const railColor  = '#5a4030';
  const postW = 10, postH = 28;
  const spacing = 45;

  cx.fillStyle = railColor;
  cx.fillRect(fr.x, fr.y+4, fr.w, 5);
  cx.fillRect(fr.x, fr.y+14, fr.w, 4);
  cx.fillRect(fr.x, fr.y+fr.h-10, fr.w, 5);
  cx.fillRect(fr.x, fr.y+fr.h-20, fr.w, 4);
  cx.fillRect(fr.x, fr.y, 5, fr.h);
  cx.fillRect(fr.x+10, fr.y, 4, fr.h);
  cx.fillRect(fr.x+fr.w-5, fr.y, 5, fr.h);
  cx.fillRect(fr.x+fr.w-14, fr.y, 4, fr.h);

  for(let px=fr.x; px<=fr.x+fr.w; px+=spacing){
    cx.fillStyle = postColor;
    cx.fillRect(px-postW/2, fr.y-8, postW, postH);
    cx.beginPath();
    cx.moveTo(px-postW/2, fr.y-8);
    cx.lineTo(px, fr.y-16);
    cx.lineTo(px+postW/2, fr.y-8);
    cx.fillStyle = '#3a2818';
    cx.fill();
  }
  for(let px=fr.x; px<=fr.x+fr.w; px+=spacing){
    cx.fillStyle = postColor;
    cx.fillRect(px-postW/2, fr.y+fr.h-postH+8, postW, postH);
    cx.beginPath();
    cx.moveTo(px-postW/2, fr.y+fr.h-postH+8);
    cx.lineTo(px, fr.y+fr.h-postH);
    cx.lineTo(px+postW/2, fr.y+fr.h-postH+8);
    cx.fillStyle = '#3a2818';
    cx.fill();
  }
  for(let py=fr.y; py<=fr.y+fr.h; py+=spacing){
    cx.fillStyle = postColor;
    cx.fillRect(fr.x-postW/2, py-postW/2, postW, postH);
    cx.fillRect(fr.x+fr.w-postW/2, py-postW/2, postW, postH);
  }
  cx.restore();
}

function drawCoop(){
  const fr = getFenceRect();
  const bx = fr.x + 30, by = fr.y - 30;
  const bw = 80, bh = 60;
  cx.save();
  cx.fillStyle = '#6b3a1f';
  cx.fillRect(bx, by, bw, bh);
  cx.beginPath();
  cx.moveTo(bx-10, by);
  cx.lineTo(bx+bw/2, by-35);
  cx.lineTo(bx+bw+10, by);
  cx.fillStyle = '#8B1A1A';
  cx.fill();
  cx.strokeStyle = '#5a1010';
  cx.lineWidth = 1;
  cx.stroke();
  cx.fillStyle = '#3a1f0a';
  cx.beginPath();
  cx.roundRect(bx+30, by+25, 20, 35, [5,5,0,0]);
  cx.fill();
  cx.fillStyle = '#2a3a5a';
  cx.fillRect(bx+8, by+15, 20, 16);
  cx.strokeStyle = '#4a5a7a';
  cx.lineWidth = 1;
  cx.strokeRect(bx+8, by+15, 20, 16);
  cx.beginPath();
  cx.moveTo(bx+18, by+15); cx.lineTo(bx+18, by+31);
  cx.moveTo(bx+8, by+23);  cx.lineTo(bx+28, by+23);
  cx.stroke();
  cx.fillStyle = '#c8a060';
  cx.fillRect(bx+28, by+5, 24, 10);
  cx.fillStyle = '#3a1f0a';
  cx.font = '6px Courier New';
  cx.textAlign = 'center';
  cx.fillText('FARM', bx+40, by+13);
  cx.restore();
}

/* ============================================================
   DRAW CHICKEN — "Упоротая пчела" стиль
============================================================ */
function drawChicken(ch){
  const {x,y,type,state,scale,angle,bobPhase,infectionTimer,digestTimer,maxDigest} = ch;
  const now = Date.now()/1000;

  cx.save();
  cx.translate(x, y);

  const bob = Math.sin(bobPhase)*2*scale;
  cx.translate(0, bob);

  const facingLeft = Math.cos(angle) < 0;

  // Shadow
  cx.save();
  cx.scale(scale*1.1, scale*0.25);
  cx.beginPath();
  cx.ellipse(0,38,18,6,0,0,Math.PI*2);
  cx.fillStyle='rgba(0,0,0,0.3)';
  cx.fill();
  cx.restore();

  // Infection ring
  if(infectionTimer > 0 && type !== 'zombie'){
    const pct = Math.min(1, infectionTimer/CFG.INFECT_TIME);
    cx.beginPath();
    cx.arc(0,0,30*scale,0,Math.PI*2);
    cx.strokeStyle=`rgba(57,255,20,${pct*0.6})`;
    cx.lineWidth=2;
    cx.stroke();
  }

  cx.save();
  cx.scale(scale*(facingLeft?-1:1), scale);

  // ---- BODY ----
  const bodyHue = type==='zombie' ? 105 : (type==='weak' ? 0 : ch.hue);
  const bodySat = type==='zombie' ? '70%' : (type==='weak' ? '0%' : '80%');
  const bodyLig = type==='zombie' ? '28%' : (type==='weak' ? '45%' : '58%');
  const bodyColor = `hsl(${bodyHue},${bodySat},${bodyLig})`;
  const bodyLigNum = type==='zombie' ? 28 : (type==='weak' ? 45 : 58);
  const bodyDark  = `hsl(${bodyHue},${bodySat},${bodyLigNum - 15}%)`;

  cx.beginPath();
  cx.arc(0, 5, 18, 0, Math.PI*2);
  cx.fillStyle = bodyColor;
  cx.fill();

  const bumps = 10;
  for(let i=0;i<bumps;i++){
    const ba = (i/bumps)*Math.PI*2;
    const bx2 = Math.cos(ba)*16;
    const by2 = Math.sin(ba)*16 + 5;
    cx.beginPath();
    cx.arc(bx2, by2, 5+Math.sin(i*2)*1.5, 0, Math.PI*2);
    cx.fillStyle = i%2===0 ? bodyColor : bodyDark;
    cx.fill();
  }

  cx.beginPath();
  cx.ellipse(0, 10, 9, 7, 0, 0, Math.PI*2);
  cx.fillStyle = type==='zombie'
    ? 'rgba(100,200,50,0.5)'
    : `hsl(${bodyHue},30%,80%)`;
  cx.fill();

  // ---- HEAD ----
  cx.beginPath();
  cx.arc(8, -14, 14, 0, Math.PI*2);
  cx.fillStyle = bodyColor;
  cx.fill();

  for(let i=0;i<8;i++){
    const ha = (i/8)*Math.PI*2;
    cx.beginPath();
    cx.arc(8+Math.cos(ha)*12, -14+Math.sin(ha)*12, 4, 0, Math.PI*2);
    cx.fillStyle = i%2===0 ? bodyColor : bodyDark;
    cx.fill();
  }

  // ---- COMB ----
  cx.fillStyle = '#cc2233';
  for(let i=0;i<4;i++){
    const cx2 = 4+i*4;
    const cy2 = -26-i%2*3;
    const cr = 3.5-i*0.3;
    cx.beginPath();
    cx.arc(cx2, cy2, cr, 0, Math.PI*2);
    cx.fill();
  }

  // ---- WATTLE ----
  cx.beginPath();
  cx.arc(18, -10, 4, 0, Math.PI*2);
  cx.fillStyle = '#cc2233';
  cx.fill();

  // ---- BEAK ----
  cx.beginPath();
  cx.moveTo(18, -16);
  cx.lineTo(28, -13);
  cx.lineTo(18, -10);
  cx.fillStyle = '#ff9900';
  cx.fill();
  cx.fillStyle = 'white';
  for(let i=0;i<3;i++){
    cx.beginPath();
    cx.rect(19+i*3, -14, 2, 3);
    cx.fill();
  }

  // ---- BIG LEFT EYE ----
  cx.beginPath();
  cx.arc(-1, -17, 8, 0, Math.PI*2);
  cx.fillStyle = 'white';
  cx.fill();
  cx.strokeStyle = '#222';
  cx.lineWidth = 1;
  cx.stroke();

  if(type==='zombie'){
    cx.save();
    cx.translate(-1,-17);
    for(let r=1;r<7;r+=1.5){
      cx.beginPath();
      cx.arc(0,0,r,0,Math.PI*1.6);
      cx.strokeStyle=`rgba(57,255,20,${0.8-r*0.1})`;
      cx.lineWidth=1;
      cx.stroke();
    }
    cx.strokeStyle='#ff0040';
    cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(-5,-5);cx.lineTo(5,5);cx.stroke();
    cx.beginPath();cx.moveTo(5,-5);cx.lineTo(-5,5);cx.stroke();
    cx.restore();
  } else {
    const pupilX = -1 + Math.sin(now*0.7)*1.5;
    const pupilY = -17 + Math.cos(now*0.9)*1.5;
    cx.beginPath();
    cx.arc(pupilX, pupilY, 5, 0, Math.PI*2);
    cx.fillStyle = '#111';
    cx.fill();
    cx.beginPath();
    cx.arc(pupilX+2, pupilY-2, 1.8, 0, Math.PI*2);
    cx.fillStyle='white';
    cx.fill();
    cx.beginPath();
    cx.arc(pupilX-2, pupilY+1, 0.8, 0, Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.6)';
    cx.fill();
  }

  // ---- SMALL RIGHT EYE ----
  cx.beginPath();
  cx.arc(13, -18, 5, 0, Math.PI*2);
  cx.fillStyle = 'white';
  cx.fill();
  cx.strokeStyle='#222';cx.lineWidth=1;cx.stroke();

  if(type==='zombie'){
    cx.strokeStyle='#ff0040';cx.lineWidth=1.2;
    cx.beginPath();cx.moveTo(10,-21);cx.lineTo(16,-15);cx.stroke();
    cx.beginPath();cx.moveTo(16,-21);cx.lineTo(10,-15);cx.stroke();
  } else {
    cx.beginPath();
    cx.arc(14,-18,3,0,Math.PI*2);
    cx.fillStyle='#111';
    cx.fill();
    cx.beginPath();
    cx.arc(15,-19,1,0,Math.PI*2);
    cx.fillStyle='white';cx.fill();
  }

  // ---- WEAK X EYES ---- (ИСПРАВЛЕНО: заменены Unicode-минусы)
  if(type==='weak'){
    [[-1,-17],[13,-18]].forEach(([ex,ey])=>{
      cx.strokeStyle='#ff3355';cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(ex-4,ey-4);cx.lineTo(ex+4,ey+4);cx.stroke();
      cx.beginPath();cx.moveTo(ex+4,ey-4);cx.lineTo(ex-4,ey+4);cx.stroke();
    });
  }

  // ---- WINGS ----
  cx.save();
  const wingFlap = Math.sin(bobPhase*2)*0.4;
  cx.translate(-12, 3);
  cx.rotate(-0.3 + wingFlap);
  cx.beginPath();
  cx.ellipse(0,0,10,6,0,0,Math.PI*2);
  cx.fillStyle = bodyDark;
  cx.fill();
  cx.restore();

  cx.save();
  cx.translate(14,3);
  cx.rotate(0.3 - wingFlap);
  cx.beginPath();
  cx.ellipse(0,0,8,5,0,0,Math.PI*2);
  cx.fillStyle = bodyDark;
  cx.fill();
  cx.restore();

  // ---- LEGS ----
  const legSwing = Math.sin(bobPhase*2.5)*5;
  cx.strokeStyle = '#cc8800';
  cx.lineWidth = 2.5;
  cx.lineCap = 'round';
  cx.beginPath();cx.moveTo(-5, 22);cx.lineTo(-5-legSwing*0.7, 32);cx.stroke();
  cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(-5-legSwing*0.7-5,32);cx.lineTo(-5-legSwing*0.7+7,32);cx.stroke();
  cx.beginPath();cx.moveTo(-5-legSwing*0.7,32);cx.lineTo(-5-legSwing*0.7-2,38);cx.stroke();
  cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(5,22);cx.lineTo(5+legSwing*0.7,32);cx.stroke();
  cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(5+legSwing*0.7-5,32);cx.lineTo(5+legSwing*0.7+7,32);cx.stroke();
  cx.beginPath();cx.moveTo(5+legSwing*0.7,32);cx.lineTo(5+legSwing*0.7-2,38);cx.stroke();

  // Zombie drips
  if(type==='zombie'){
    for(let i=0;i<3;i++){
      const dx2 = -8+i*8;
      const dy2 = 20+Math.sin(now*2+i)*2;
      cx.beginPath();
      cx.ellipse(dx2,dy2,2,3+Math.sin(now*3+i),0,0,Math.PI*2);
      cx.fillStyle='rgba(57,255,20,0.65)';
      cx.fill();
    }
    const aura = cx.createRadialGradient(0,0,5,0,0,28);
    aura.addColorStop(0,'rgba(57,255,20,0.08)');
    aura.addColorStop(1,'rgba(57,255,20,0)');
    cx.beginPath();cx.arc(0,0,28,0,Math.PI*2);
    cx.fillStyle=aura;cx.fill();
  }

  // Ready glow
  if(state==='ready'){
    const grd = cx.createRadialGradient(0,-5,2,0,-5,28);
    grd.addColorStop(0,'rgba(245,197,24,0.22)');
    grd.addColorStop(1,'rgba(245,197,24,0)');
    cx.beginPath();cx.arc(0,-5,28,0,Math.PI*2);
    cx.fillStyle=grd;cx.fill();
  }

  cx.restore(); // end flip

  // ---- DIGEST ARC ----
  if(state==='digesting'){
    const pct = 1 - digestTimer/maxDigest;
    cx.save();
    cx.scale(scale,scale);
    cx.beginPath();
    cx.arc(0,-32,12,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
    cx.strokeStyle = type==='zombie' ? '#39ff14' : '#f5c518';
    cx.lineWidth=3;cx.lineCap='round';cx.stroke();
    cx.restore();
  }

  // ---- STATE ICON ----
  let icon='';
  if(state==='hungry')    icon='😐';
  if(state==='digesting') icon=type==='zombie'?'🧠':'🍗';
  if(state==='ready')     icon='🥚';
  if(icon){
    cx.font=`${13*scale}px serif`;
    cx.textAlign='center';
    cx.fillText(icon, 0, -44*scale + bob*0.4);
  }

  // Hit box
  ch._hx = x - 25*scale;
  ch._hy = y - 55*scale + bob;
  ch._hw = 50*scale;
  ch._hh = 80*scale;

  cx.restore();
}

  }

}

/* ============================================================
   DRAW FARMER (BEAR)
============================================================ */
function drawFarmer(){
  const {x,y,angle,state,bucketSwing} = FARMER;
  const now = Date.now()/1000;
  const facingLeft = Math.cos(angle) < 0;
  const bob = Math.sin(now*6)*1.5;
  const sc = 1.15;

  cx.save();
  cx.translate(x, y+bob);

  cx.save();
  cx.scale(sc, 0.2*sc);
  cx.beginPath();cx.ellipse(0,50,20,7,0,0,Math.PI*2);
  cx.fillStyle='rgba(0,0,0,0.35)';cx.fill();
  cx.restore();

  cx.save();
  cx.scale(sc*(facingLeft?-1:1), sc);

  // ---- LEGS ----
  const legSwing = state==='walking' ? Math.sin(now*8)*8 : 0;
  cx.fillStyle='#5a2d0a';
  cx.save();
  cx.translate(-8,28);cx.rotate(legSwing*0.1);
  cx.beginPath();cx.roundRect(-5,0,10,18,3);cx.fill();
  cx.fillStyle='#3a1d05';
  cx.beginPath();cx.ellipse(0,18,8,4,0,0,Math.PI*2);cx.fill();
  cx.restore();
  cx.save();
  cx.translate(8,28);cx.rotate(-legSwing*0.1);
  cx.fillStyle='#5a2d0a';
  cx.beginPath();cx.roundRect(-5,0,10,18,3);cx.fill();
  cx.fillStyle='#3a1d05';
  cx.beginPath();cx.ellipse(0,18,8,4,0,0,Math.PI*2);cx.fill();
  cx.restore();

  // ---- BODY ----
  cx.beginPath();
  cx.ellipse(0,10,20,24,0,0,Math.PI*2);
  cx.fillStyle='#6b3010';cx.fill();
  cx.beginPath();
  cx.ellipse(0,14,11,13,0,0,Math.PI*2);
  cx.fillStyle='#c8a070';cx.fill();

  // ---- ARMS ----
  const armSwing = state==='walking' ? Math.sin(now*8)*0.4 : (state==='feeding' ? -0.6 : 0);
  cx.save();
  cx.translate(-18,4);cx.rotate(armSwing);
  cx.beginPath();cx.roundRect(-5,0,10,16,4);
  cx.fillStyle='#6b3010';cx.fill();
  cx.beginPath();cx.ellipse(0,17,7,5,0,0,Math.PI*2);
  cx.fillStyle='#3a1d05';cx.fill();
  cx.restore();

  cx.save();
  cx.translate(18,4);cx.rotate(-armSwing + bucketSwing);
  cx.beginPath();cx.roundRect(-5,0,10,16,4);
  cx.fillStyle='#6b3010';cx.fill();
  cx.beginPath();cx.ellipse(0,17,7,5,0,0,Math.PI*2);
  cx.fillStyle='#3a1d05';cx.fill();

    // Ведро только если не плачет
  if(state !== 'crying'){
    cx.save();cx.translate(2,18);
    cx.beginPath();
    cx.moveTo(-7,0);cx.lineTo(-5,14);cx.lineTo(9,14);cx.lineTo(7,0);
    cx.fillStyle='#8B6914';cx.fill();
    cx.strokeStyle='#5a4008';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(1,-2,7,Math.PI,Math.PI*2);
    cx.strokeStyle='#5a4008';cx.lineWidth=1.5;cx.stroke();
    cx.beginPath();cx.ellipse(1,2,6,3,0,0,Math.PI*2);
    cx.fillStyle='#c8a020';cx.fill();
    cx.restore();
  } else {
    // слёзы при плаче
    cx.save();cx.translate(2,18);
    for(let i=0;i<3;i++){
      cx.beginPath();
      cx.ellipse(-4+i*4, 4+i*3, 2, 3, 0, 0, Math.PI*2);
      cx.fillStyle=`rgba(100,180,255,${0.7-i*0.15})`;
      cx.fill();
    }
    cx.restore();
  }
  cx.restore(); // конец правой руки

  // ---- HEAD ----
  cx.beginPath();
  cx.arc(0,-24,17,0,Math.PI*2);
  cx.fillStyle='#6b3010';cx.fill();
  for(let i=0;i<8;i++){
    const ha=(i/8)*Math.PI*2;
    cx.beginPath();
    cx.arc(Math.cos(ha)*15,-24+Math.sin(ha)*15,5,0,Math.PI*2);
    cx.fillStyle=i%2===0?'#6b3010':'#5a2808';
    cx.fill();
  }

  // ---- FACE ----
  cx.beginPath();
  cx.ellipse(0,-22,11,10,0,0,Math.PI*2);
  cx.fillStyle='#d4b090';cx.fill();

  cx.fillStyle='rgba(0,0,0,0.15)';
  cx.beginPath();cx.ellipse(-4,-20,3,2.5,0.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(5,-21,2.5,2,-0.2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(1,-25,2,1.5,0,0,Math.PI*2);cx.fill();

  // ---- EYES ----
  // Паника — глаза шире, при плаче — слёзы
  const eyeSize = (state==='panic') ? 5.5 : 4.5;
  cx.beginPath();cx.arc(-6,-26,eyeSize,0,Math.PI*2);
  cx.fillStyle='#f0e0d0';cx.fill();
  cx.beginPath();cx.arc(-6,-26,eyeSize-1.5,0,Math.PI*2);
  cx.fillStyle = state==='panic'?'#ff3355':'#111';cx.fill();
  cx.beginPath();cx.arc(-5,-27,1,0,Math.PI*2);
  cx.fillStyle='white';cx.fill();

  cx.beginPath();cx.arc(6,-26,eyeSize,0,Math.PI*2);
  cx.fillStyle='#f0e0d0';cx.fill();
  cx.beginPath();cx.arc(6,-26,eyeSize-1.5,0,Math.PI*2);
  cx.fillStyle = state==='panic'?'#ff3355':'#111';cx.fill();
  cx.beginPath();cx.arc(7,-27,1,0,Math.PI*2);
  cx.fillStyle='white';cx.fill();

  // слёзы при плаче
  if(state==='crying'){
    cx.fillStyle='rgba(100,180,255,0.8)';
    cx.beginPath();cx.ellipse(-6,-20,2,4,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(6,-20,2,4,0,0,Math.PI*2);cx.fill();
  }

  cx.beginPath();cx.arc(0,-19,3.5,0,Math.PI*2);
  cx.fillStyle='#222';cx.fill();
  cx.beginPath();cx.arc(-1,-18,1,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fill();

  // Рот — меняется по состоянию
  cx.strokeStyle='#3a1d05';cx.lineWidth=1.5;
  cx.beginPath();
  if(state==='feeding'){
    cx.arc(0,-16,6,0,Math.PI); // улыбка большая
  } else if(state==='panic'){
    cx.arc(0,-14,5,Math.PI,0); // рот открыт от испуга
  } else if(state==='crying'){
    cx.arc(0,-14,5,Math.PI,0); // горе
  } else {
    cx.arc(0,-15,4,0.1,Math.PI-0.1); // нейтральная
  }
  cx.stroke();

  // ---- EARS ----
  [[-14,-38],[14,-38]].forEach(([ex,ey])=>{
    cx.beginPath();cx.arc(ex,ey,7,0,Math.PI*2);
    cx.fillStyle='#6b3010';cx.fill();
    cx.beginPath();cx.arc(ex,ey,4,0,Math.PI*2);
    cx.fillStyle='#9a5030';cx.fill();
  });

  // Hat
  cx.fillStyle='#3a2a0a';
  cx.beginPath();cx.ellipse(0,-41,14,4,0,0,Math.PI*2);cx.fill();
  cx.fillRect(-9,-58,18,18);
  cx.fillStyle='#4a3a1a';
  cx.beginPath();cx.ellipse(0,-40,18,5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#8b6914';
  cx.fillRect(-9,-43,18,4);

  // При панике — шляпа трясётся
  if(state==='panic'){
    const hatWobble = Math.sin(Date.now()/60)*5;
    cx.save();
    cx.translate(0,-49);
    cx.rotate(hatWobble*0.04);
    cx.fillStyle='#3a2a0a';
    cx.fillRect(-9,-9,18,18);
    cx.fillStyle='#4a3a1a';
    cx.beginPath();cx.ellipse(0,9,18,5,0,0,Math.PI*2);cx.fill();
    cx.restore();
  }

  cx.restore(); // конец flip

  // ---- SPEECH BUBBLE ----
  if(FARMER.bubbleText){
    drawSpeechBubble(FARMER.bubbleText, 0, -70*sc, sc, false);
  }

  // ---- CLICK ZONE ----
  FARMER._hx = x - 22*sc;
  FARMER._hy = y - 65*sc;
  FARMER._hw = 44*sc;
  FARMER._hh = 80*sc;

  cx.restore();
}

/* ============================================================
   CHICKEN UPDATE
============================================================ */
function updateChicken(ch, dt){
  const eff = dt * DBG.speedMult;
  const fr = getFenceRect();
  const pad = 25;

  const spd = ch.type==='zombie' ? CFG.SPEED_ZOMBIE :
              ch.type==='weak'   ? CFG.SPEED_WEAK   : CFG.SPEED_NORMAL;

  ch.turnTimer -= eff;
  if(ch.turnTimer <= 0){
    ch.turnTimer = (ch.type==='zombie') ? 0.8+Math.random()*1.5 : 1.5+Math.random()*2.5;
    const spread = ch.type==='zombie' ? Math.PI*1.4 : Math.PI*0.6;
    ch.targetAngle = ch.angle + (Math.random()-0.5)*spread*2;
  }

  const rotSpd = ch.type==='zombie' ? 5 : 2.5;
  let da = ch.targetAngle - ch.angle;
  while(da > Math.PI) da -= Math.PI*2;
  while(da < -Math.PI) da += Math.PI*2;
  ch.angle += da * Math.min(1, rotSpd*eff);

  ch.x += Math.cos(ch.angle)*spd*eff;
  ch.y += Math.sin(ch.angle)*spd*eff;

  if(ch.x < fr.x+pad)      {ch.x=fr.x+pad;      ch.targetAngle=Math.PI-ch.angle;}
  if(ch.x > fr.x+fr.w-pad) {ch.x=fr.x+fr.w-pad; ch.targetAngle=Math.PI-ch.angle;}
  if(ch.y < fr.y+pad)      {ch.y=fr.y+pad;       ch.targetAngle=-ch.angle;}
  if(ch.y > fr.y+fr.h-pad) {ch.y=fr.y+fr.h-pad; ch.targetAngle=-ch.angle;}

  ch.bobPhase += eff*(ch.type==='zombie'?9:4.5);
  if(ch.type === 'normal' || ch.type === 'weak'){
    ch.cluckTimer -= eff;
    if(ch.cluckTimer <= 0){
      ch.cluckTimer = 3 + Math.random()*6;
      playSound('cluck'); // кастомный или дефолтный
    }
  }
  // Bubble countdown
  if(ch.bubbleTimer > 0){
    ch.bubbleTimer -= eff;
    if(ch.bubbleTimer <= 0) ch.bubbleText = null;
  }

  if(ch.state==='digesting'){
    ch.digestTimer -= eff;
    if(ch.digestTimer<=0){ch.digestTimer=0;ch.state='ready';}
  }

  // Зомби автокормёжка
  if(ch.type==='zombie' && ch.state==='hungry'){
    ch.autoFeedTimer += eff;
    if(ch.autoFeedTimer >= CFG.ZOMBIE_AUTOFEED){
      ch.autoFeedTimer = 0;
      startDigest(ch);
      G.chaos = Math.min(100, G.chaos+4);
      log(`🧟 Zombie #${ch.id+1} self-feeds!`,'r');
    }
  }

// Зомби мем-таймер (Приоритет 4)
if(ch.type==='zombie'){
  ch.memeTimer -= eff;
  const interval = Math.max(1.2, CFG.ZOMBIE_IDLE - G.chaos/22);
  if(ch.memeTimer <= 0){
    ch.memeTimer = interval;

    // Звук — только ОДИН РАЗ за жизнь зомби
    const memeSounds = ['meme1','meme2','meme3'];
    const randomMeme = memeSounds[Math.floor(Math.random()*memeSounds.length)];

    if(!ch.memeSoundPlayed){
      ch.memeSoundPlayed = true;
      const src = _audios[randomMeme] || _audios['zombie'];
      if(src){
        const a = new Audio(src);
        a.volume = G.volume;
        a.play().catch(()=>{});
      } else {
        playTone(ch.zombieFreq, ch.zombiePitch, 0.3,
          0.06 + G.chaos/100*0.1);
        playTone(ch.zombieFreq*1.5, 'square', 0.2, 0.03, 0.1);
      }
    }

    const memeWord = MEME_WORDS[Math.floor(Math.random()*MEME_WORDS.length)];
    ch.bubbleText = memeWord;
    ch.bubbleTimer = 2.5;

    if(G.chaos > 15) spawnMeme(ch.x, ch.y);
    if(G.chaos > 60){
      for(let i=0;i<3;i++){
        setTimeout(()=>spawnMeme(
          ch.x+(Math.random()-0.5)*80,
          ch.y+(Math.random()-0.5)*40
        ), i*200);
      }
    }
    G.chaos = Math.min(100, G.chaos+0.5);
  }
}



  // Заражение при столкновении
  if(ch.type==='zombie'){
    for(const other of G.chickens){
      if(other===ch || other.type==='zombie') continue;
      const dx = other.x-ch.x, dy = other.y-ch.y;
      if(Math.sqrt(dx*dx+dy*dy) < CFG.INFECT_RANGE){
        other.infectionTimer += eff;
        const zombieCount = G.chickens.filter(c=>c.type==='zombie').length;
        const thresh = Math.max(0.8, CFG.INFECT_TIME - G.chaos/15 - zombieCount*0.2);
        if(other.infectionTimer >= thresh) mutateChicken(other);
      } else {
        other.infectionTimer = Math.max(0, other.infectionTimer - eff*0.4);
      }
    }
  }
}

function startDigest(ch){
  ch.state = 'digesting';
  const t = ch.type==='zombie' ? CFG.DIGEST_ZOMBIE :
            ch.type==='weak'   ? CFG.DIGEST_WEAK   : CFG.DIGEST_NORMAL;
  ch.digestTimer = ch.maxDigest = t;
}

/* ============================================================
   CLICK ON FARM
============================================================ */
function onFarmClick(e){
  if(G.gameOver) return;
  const wrap = document.getElementById('farm-wrap');
  const r = wrap.getBoundingClientRect();
  const mx = (e.clientX-r.left)*(FW/r.width);
  const my = (e.clientY-r.top )*(FH/r.height);

  // Клик на фермера (Приоритет 2)
  if(FARMER._hx && mx>=FARMER._hx && mx<=FARMER._hx+FARMER._hw &&
     my>=FARMER._hy && my<=FARMER._hy+FARMER._hh){
    handleFarmerClick();
    return;
  }

  for(const ch of G.chickens){
    if(mx>=ch._hx&&mx<=ch._hx+ch._hw&&my>=ch._hy&&my<=ch._hy+ch._hh){
      handleClick(ch); return;
    }
  }
}

// Клик на фермера — спасает от плача, паники и тд (Приоритет 2)
function handleFarmerClick(){
  if(FARMER.state==='crying'){
    FARMER.state='idle';
    G.chaos = Math.max(0, G.chaos-8);
    setFarmerBubble('🙏 спасибо!', 2);
    playTone(700,'sine',0.15,0.12);
    log('👨‍🌾 Фермер успокоился! Chaos -8','g');
    return;
  }
  if(FARMER.state==='panic'){
    setFarmerBubble('💪 держусь!', 2);
    G.chaos = Math.max(0, G.chaos-3);
    playTone(600,'sine',0.1,0.1);
    return;
  }
  setFarmerBubble('😊 всё под контролем', 2);
}

function handleClick(ch){
  if(ch.state==='hungry'){
    if(G.feed<1){log('No feed!','r');return;}
    G.feed--;
    startDigest(ch);
    playTone(600,'sine',0.07,0.09);
    log(`🌽 Fed #${ch.id+1}`,'g');
  } else if(ch.state==='ready'){
    const amt = ch.type==='zombie' ? 3 :
                ch.type==='weak'   ? (Math.random()>0.45?1:0) : 1;
    G.eggs+=amt; G.totalEggs+=amt;
    ch.state='hungry';
    if(amt>0){
      playSound('collect');
      spawnEggFloat(ch.x, ch.y, amt);
      log(`🥚 Collected ${amt} from #${ch.id+1}`,'g');
    } else {
      log(`😔 Weak #${ch.id+1} gave nothing`,'y');
    }
  }
}

function feedAll(){
  const hungry = G.chickens.filter(c=>c.state==='hungry');
  if(!hungry.length){log('No hungry chickens','y');return;}
  if(G.feed<1){log('No feed!','r');return;}
  let fed=0;
  for(const ch of hungry){if(G.feed<1)break;G.feed--;startDigest(ch);fed++;}
  playTone(600,'sine',0.07,0.09);
  log(`🌽 Fed ${fed} chickens`,'g');
}

function buyChicken(){
  if(G.eggs<G.buyCost){log('Not enough eggs!','r');return;}
  G.eggs -= G.buyCost;
  G.buyCost = Math.floor(G.buyCost*1.3);
  const ch = mkChicken('normal');
  G.chickens.push(ch);
  playTone(800,'sine',0.1,0.12);
  log(`🐔 Bought chicken #${ch.id+1}`,'b');
}

function mutateChicken(ch, silent=false, isAutoEvent=false){
  ch.type = 'zombie';
  ch.infectionTimer = 0;
  G.totalMutations++;
  ch.memeSoundPlayed = false;
  G.chaos = Math.min(100, G.chaos+9);
  playSound('mutate');
  playSound('infected'); // ← твой кастомный звук заражения
  triggerGlitch();

  // Большой мем по центру (Приоритет 4)
  const memeWord = MEME_WORDS[Math.floor(Math.random()*MEME_WORDS.length)];
  showBigMeme(`☣️ ${memeWord.toUpperCase()} ☣️`);
  spawnMeme(ch.x, ch.y);

  // Пузырь над курицей
  ch.bubbleText = memeWord;
  ch.bubbleTimer = 3;

  if(!silent) log(`☣️ #${ch.id+1} MUTATED → ZOMBIE`,'r');
  if(isAutoEvent) log('💀 Первое заражение! Используй Antivirus!','r');
}

function installUpdate(){
  if(G.eggs<G.updateCost){log('Not enough eggs!','r');return;}
  const cands = G.chickens.filter(c=>c.type!=='zombie');
  if(!cands.length){log('No targets','y');return;}
  G.eggs -= G.updateCost;
  G.updateCost = Math.floor(G.updateCost*1.2);
  mutateChicken(cands[Math.floor(Math.random()*cands.length)]);
}

function useAntivirus(){
  if(G.eggs<G.avCost){log('Not enough eggs!','r');return;}
  G.eggs -= G.avCost;
  G.avCost = Math.floor(G.avCost*1.1);
  G.chaos = Math.max(0, G.chaos-22);
  G.antivirusUsed++;

  const z = G.chickens.filter(c=>c.type==='zombie');
  if(z.length){
    const t = z[Math.floor(Math.random()*z.length)];
    t.type = 'weak';
    log(`🛡️ #${t.id+1} → weak`,'b');

    // ⏱ Через 8-12 сек — вирус возвращается x2
    const delay = 8000 + Math.random()*4000;
    log(`⚠️ Вирус подавлен... но ненадолго!`,'y');

    setTimeout(()=>{
      if(G.gameOver) return; // игра уже кончилась — не спавним

      const normals = G.chickens.filter(c=>c.type==='normal');

      if(normals.length === 0){
        log(`🧬 Вирус мутировал но некого заразить...`,'y');
        return;
      }

      // заражаем 2 случайных (или сколько есть)
      const toInfect = Math.min(2, normals.length);
      // перемешиваем массив
      const shuffled = normals.sort(()=>Math.random()-0.5);

      for(let i=0; i<toInfect; i++){
        mutateChicken(shuffled[i], false, false);
      }

      log(`💀 ВИРУС МУТИРОВАЛ! +${toInfect} зомби!`,'r');
      setFarmerBubble('😱 ОН ВЕРНУЛСЯ!', 4);
      triggerGlitch();

    }, delay);
  } else {
    log(`🛡️ Нет зомби для лечения`,'y');
  }

  playAntivirusSound();
  setFarmerBubble('🛡️ antivirus!', 3);
  log(`⚡ Chaos → ${G.chaos.toFixed(0)}%`,'g');
}

function updateChaos(dt){
  const eff = dt * DBG.speedMult;
  const zc = G.chickens.filter(c=>c.type==='zombie').length;
  const nc = G.chickens.filter(c=>c.type==='normal').length;

  // Если фермер плачет — хаос растёт быстрее (Приоритет 2)
  const cryBonus = FARMER.state==='crying' ? 1.5 : 1;

  G.chaos += (zc*CFG.CHAOS_ZOMBIE*eff + nc*CFG.CHAOS_NORMAL*eff) * cryBonus;
  G.chaos = Math.min(100, Math.max(0, G.chaos));
}

/* ============================================================
   MAIN LOOP (Приоритет 1, 5)
============================================================ */
let _lastTs=null;
 
function updateScriptEvents(){
  if(G.gameTime > 25 && G.totalMutations === 0 && !G._firstZombieDone){
    G._firstZombieDone = true; // ← срабатывает только ОДИН раз
    const normals = G.chickens.filter(c=>c.type==='normal');
    if(normals.length){
      mutateChicken(normals[0], false, true);
      setFarmerBubble('😱 ЧТО?!', 3);
    }
  }
}


function loop(ts){
  if(G.gameOver) return;
  if(!_lastTs) _lastTs=ts;
  const dt = Math.min((ts-_lastTs)/1000, 0.1);
  _lastTs = ts;

  // Счётчик времени игры
  G.gameTime += dt * DBG.speedMult;

  for(const ch of G.chickens) updateChicken(ch, dt);
  updateFarmer(dt);
  updateChaos(dt);
  updateFeed(dt);
  updateScriptEvents();

  // Случайные мемы при высоком хаосе
  if(G.chaos>50 && Math.random()<dt*DBG.speedMult*0.4){
    const ch = G.chickens[Math.floor(Math.random()*G.chickens.length)];
    if(ch) spawnMeme(ch.x, ch.y);
  }

  drawFrame();
  renderHUD();

  if(G.chaos>=100){triggerGameOver();return;}
  G._raf = requestAnimationFrame(loop);

}

let _actx=null;
function getACtx(){
  if(!_actx){ try{_actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  return _actx;
}
function playTone(freq,type,dur,vol=0.1,delay=0){
  const c=getACtx();if(!c)return;
  try{
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.value=freq;
    const v=vol*G.volume;
    g.gain.setValueAtTime(0,c.currentTime+delay);
    g.gain.linearRampToValueAtTime(v,c.currentTime+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+delay+dur);
    o.start(c.currentTime+delay);
    o.stop(c.currentTime+delay+dur+0.05);
  }catch(e){}
}
function playAntivirusSound(){
  [523,659,784,1046].forEach((f,i)=>playTone(f,'sine',0.12,0.13,i*0.09));
}

function loadSound(key, input){
  if(!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();

  reader.onload = function(e){
    const base64 = e.target.result;
    _audios[key] = base64;

    // Сохраняем в браузере
    try{
      localStorage.setItem('sound_' + key, base64);
      log(`🔊 Sound "${key}" saved!`, 'g');
    } catch(e){
      // Файл слишком большой для localStorage
      log(`🔊 Sound "${key}" loaded (not saved - too big)`, 'y');
    }
  };

  reader.readAsDataURL(file);
}

// Загружаем сохранённые звуки при старте
function loadSavedSounds(){
  const keys = ['mutate','zombie','collect','gameover',
                 'cluck','infected','meme1','meme2','meme3'];
  let loaded = 0;
  for(const key of keys){
    // Сначала проверяем localStorage
    const saved = localStorage.getItem('sound_' + key);
    if(saved){
      _audios[key] = saved;
    }
    // Если нет — берём из папки sounds/
    else if(DEFAULT_SOUNDS[key]){
      _audios[key] = DEFAULT_SOUNDS[key];
    }
  }
}

  // сначала смотрим загруженный пользователем
  // потом дефолтный base64
  // потом синтез
function playSound(key){
  // 1. Сначала загруженный пользователем через панель
  if(_audios[key]){
    try{
      const a = new Audio(_audios[key]);
      a.volume = G.volume;
      a.play().catch(()=>{});
    }catch(e){}
    return;
  }

  // 2. Потом дефолтный base64
  if(DEFAULT_SOUNDS[key]){
    try{
      const a = new Audio(DEFAULT_SOUNDS[key]);
      a.volume = G.volume;
      a.play().catch(()=>{});
    }catch(e){}
    return;
  }

  // 3. Синтез если ничего нет
  switch(key){
    case 'mutate':
      playTone(300,'sawtooth',0.1,0.2);
      playTone(180,'sawtooth',0.2,0.18,0.1);
      playTone(100,'square',0.4,0.15,0.22);
      break;
    case 'zombie':
      const f=200+Math.random()*220;
      playTone(f,'sawtooth',0.25,0.06+G.chaos/100*0.07);
      playTone(f*1.3,'square',0.15,0.03,0.12);
      break;
    case 'collect':
      playTone(1046,'sine',0.1,0.11);
      playTone(1318,'sine',0.1,0.11,0.07);
      playTone(1568,'sine',0.13,0.09,0.14);
      break;
    case 'gameover':
      for(let i=0;i<9;i++){
        playTone(360-i*30,'sawtooth',0.3,0.18,i*0.11);
        playTone((360-i*30)*0.74,'square',0.2,0.12,i*0.11+0.05);
      }
      break;
    case 'cluck':
      playTone(800,'sine',0.04,0.06);
      setTimeout(()=>playTone(750,'sine',0.04,0.05),80);
      setTimeout(()=>playTone(820,'sine',0.05,0.06),160);
      break;
    case 'infected':
      playTone(200,'sawtooth',0.3,0.15);
      playTone(150,'square',0.4,0.12,0.15);
      break;
    case 'meme1':
    case 'meme2':
    case 'meme3':
      playTone(400+Math.random()*200,'square',0.15,0.05);

}
